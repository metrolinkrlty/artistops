<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#6366f1"/>
  <!-- Two connected eighth notes (♫) -->
  <g fill="white">
    <!-- Beam at top -->
    <rect x="9" y="9" width="14" height="2.5" rx="1"/>
    <!-- Left stem -->
    <rect x="9" y="9" width="1.8" height="11" rx="0.7"/>
    <!-- Right stem -->
    <rect x="21.2" y="9" width="1.8" height="9" rx="0.7"/>
    <!-- Left note head -->
    <ellipse cx="10.5" cy="20.5" rx="3.2" ry="2.1" transform="rotate(-20 10.5 20.5)"/>
    <!-- Right note head -->
    <ellipse cx="22.5" cy="18.5" rx="3.2" ry="2.1" transform="rotate(-20 22.5 18.5)"/>
  </g>
</svg>
